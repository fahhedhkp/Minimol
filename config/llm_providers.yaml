providers:
  ollama:
    type: ollama
    enabled: true
    endpoint: http://localhost:11434
    models:
      - llama2:70b
      - mistral:latest
      - neural-chat:latest
      - dolphin-mixtral:latest
    settings:
      temperature: 0.7
      max_tokens: 2048
    use_cases:
      - general
      - fast_inference
      - privacy_sensitive
      - cost_optimization
    cost_per_1m_tokens: 0.0  # Local, no cost
    latency_ms: 50.0

  claude:
    type: claude
    enabled: true
    api_key: ${ANTHROPIC_API_KEY}
    models:
      - claude-3-opus-20240229
      - claude-3-sonnet-20240229
      - claude-3-haiku-20240307
    settings:
      temperature: 0.7
      max_tokens: 4096
    use_cases:
      - complex_reasoning
      - code_generation
      - analysis
    cost_per_1m_tokens: 15.0  # Premium pricing
    latency_ms: 500.0
    supports_streaming: true
    supports_function_calling: true

  openai:
    type: openai
    enabled: true
    api_key: ${OPENAI_API_KEY}
    models:
      - gpt-4
      - gpt-4-turbo-preview
      - gpt-3.5-turbo
    settings:
      temperature: 0.8
      max_tokens: 2048
    use_cases:
      - general
      - creative_writing
      - analysis
    cost_per_1m_tokens: 30.0  # Premium pricing
    latency_ms: 600.0
    supports_streaming: true
    supports_function_calling: true

  gemini:
    type: gemini
    enabled: false  # Requires google-generativeai
    api_key: ${GOOGLE_API_KEY}
    models:
      - gemini-pro
      - gemini-pro-vision
    settings:
      temperature: 0.7
      max_tokens: 2048
    use_cases:
      - general
      - analysis
    cost_per_1m_tokens: 0.5  # Budget option
    latency_ms: 400.0

  mistral:
    type: mistral
    enabled: false  # Requires mistralai
    api_key: ${MISTRAL_API_KEY}
    models:
      - mistral-large
      - mistral-medium
      - mistral-small
    settings:
      temperature: 0.7
      max_tokens: 2048
    use_cases:
      - general
      - code_generation
      - cost_optimization
    cost_per_1m_tokens: 0.14  # Very budget-friendly
    latency_ms: 200.0

  cohere:
    type: cohere
    enabled: false  # Requires cohere
    api_key: ${COHERE_API_KEY}
    models:
      - command
      - command-light
    settings:
      temperature: 0.7
      max_tokens: 2048
    use_cases:
      - general
      - creative_writing
    cost_per_1m_tokens: 1.0
    latency_ms: 300.0

# Routing configuration
routing:
  default_provider: ollama  # Start with local Ollama (free, no limits)
  fallback_chain:
    - ollama              # Try local first
    - claude              # Then Claude
    - openai              # Then GPT-4
    - mistral             # Budget option
  auto_select: true        # Automatically select best provider
  criteria:
    - task_type
    - context_length
    - cost_optimization
    - latency_requirement
    - privacy_requirement

# Cost optimization settings
cost_optimization:
  enabled: true
  prefer_free: true        # Prefer free local models
  budget_per_hour: null    # Set to limit spending (e.g., 1.0 for $1/hour)
